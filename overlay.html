<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            margin: 0;
            background: transparent;
            overflow: hidden;
            font-family: sans-serif;
        }

        #ocr {
            top: 20px;
            right: 20px;
            padding: 8px 12px;
        }

        .cps-box {
            position: fixed;
            background: rgba(0, 0, 0, 0.45);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            font-weight: 600;
            border-radius: 6px;
            z-index: 9999;
        }

        #keystrokes {
            position: fixed;
            bottom: 50px;
            left: 20px;
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(4, 60px);
            gap: 5px;
            justify-content: center;
            align-content: center;
            padding: 5px;
            border-radius: 8px;
            z-index: 9999;
        }

        .key {
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            background: rgba(30, 33, 41, 0.95);
            border-radius: 6px;
            transition: all 0.1s ease;
        }

        .space {
            width: 100%;
            grid-column: 4 / 4;
        }

        .mouse-row {
            grid-column: 1 / 4;
            display: flex;
            justify-content: center;
            gap: 5px;
        }

        .mouse-row .key {
            flex: 1;
        }
    </style>
</head>

<body>
    <div id="cps" class="cps-box">CPS: null | null</div>
    <div id="keystrokes"></div>
    <div id="ocr" class="cps-box">OCR: ...</div>


    <script src="script.js"></script>

</body>

</html>
